<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist hôm nay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
.container { max-width: 640px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.progress { font-size: 12px; background: #e8f0fe; color: #1a56db; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid #ccc; border-radius: 99px; background: white; cursor: pointer; }
.filter-btn.active { background: #1a56db; color: white; border-color: #1a56db; }
.add-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.add-row input, .add-row select { font-size: 13px; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: white; }
.add-row input { flex: 1; }
.add-row button { padding: 8px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; }
.task-item { display: flex; align-items: center; gap: 10px; background: white; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
.task-item.done { opacity: 0.4; }
.task-item.editing { border-color: #1a56db; }
.task-item input[type=checkbox] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: #1a56db; }
.task-label { flex: 1; font-size: 14px; cursor: pointer; }
.task-item.done .task-label { text-decoration: line-through; color: #999; }
.task-edit-input { flex: 1; font-size: 14px; border: none; outline: none; background: transparent; }
.badge { display: inline-flex; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; cursor: pointer; }
.badge-kh { background: #e8f0fe; color: #1a56db; }
.badge-nv { background: #e3fcef; color: #057a55; }
.badge-ht { background: #fdf6b2; color: #8e4b10; }
.badge-high { background: #fde8e8; color: #c81e1e; }
.badge-med { background: #fdf6b2; color: #8e4b10; }
.badge-low { background: #e3fcef; color: #057a55; }
.task-actions { display: flex; gap: 4px; opacity: 0; }
.task-item:hover .task-actions { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; color: #999; font-size: 15px; padding: 2px 4px; }
.icon-btn:hover { color: #333; }
.actions { display: flex; gap: 8px; margin-top: 1rem; }
.export-btn { flex: 1; font-size: 13px; padding: 8px; border: 0.5px solid #1a56db; border-radius: 8px; background: #1a56db; color: white; cursor: pointer; font-weight: 500; }
.clear-btn { font-size: 13px; padding: 8px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: white; cursor: pointer; color: #666; }
.export-box { margin-top: 1rem; background: white; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 14px; display: none; }
.export-box pre { font-size: 13px; line-height: 1.6; white-space: pre-wrap; color: #1a1a1a; font-family: inherit; }
.copy-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid #ccc; border-radius: 6px; background: white; cursor: pointer; margin-top: 10px; }
.copy-btn.copied { background: #e3fcef; color: #057a55; border-color: #057a55; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 Checklist hôm nay <span class="progress" id="progress">0/0 xong</span></h1>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tất cả</button>
    <button class="filter-btn" onclick="setFilter('kh',this)">Khách hàng</button>
    <button class="filter-btn" onclick="setFilter('nv',this)">Nội vụ</button>
    <button class="filter-btn" onclick="setFilter('ht',this)">Hệ thống</button>
    <button class="filter-btn" onclick="setFilter('high',this)">🔴 Gấp</button>
  </div>

  <div class="add-row">
    <input id="new-task" type="text" placeholder="Thêm việc cần làm..." onkeydown="if(event.key==='Enter')addTask()" />
    <select id="cat-sel">
      <option value="kh">Khách hàng</option>
      <option value="nv">Nội vụ</option>
      <option value="ht">Hệ thống</option>
    </select>
    <select id="pri-sel">
      <option value="high">🔴 Gấp</option>
      <option value="med">🟡 Bình thường</option>
      <option value="low">🟢 Thấp</option>
    </select>
    <button onclick="addTask()">+</button>
  </div>

  <div id="task-list"></div>

  <div class="actions">
    <button class="export-btn" onclick="exportRecheck()">📤 Xuất Recheck</button>
    <button class="clear-btn" onclick="clearDone()">Xoá đã xong</button>
  </div>

  <div class="export-box" id="export-box">
    <pre id="export-text"></pre>
    <button class="copy-btn" id="copy-btn" onclick="copyExport()">Copy</button>
  </div>
</div>

<script>
let tasks = [], id = 0, filter = 'all', editingId = null;
const catL = { kh:'Khách hàng', nv:'Nội vụ', ht:'Hệ thống' };
const catCycle = { kh:'nv', nv:'ht', ht:'kh' };
const priL = { high:'🔴 Gấp', med:'🟡 Bình thường', low:'🟢 Thấp' };
const priCycle = { high:'med', med:'low', low:'high' };

const defaults = [
  { text:'Kiểm tra tin nhắn khách hàng mới', cat:'kh', pri:'high' },
  { text:'Follow up khách chờ phản hồi', cat:'kh', pri:'med' },
  { text:'Cập nhật báo cáo cuối ngày', cat:'nv', pri:'med' },
  { text:'Kiểm tra trạng thái hệ thống', cat:'ht', pri:'low' },
];

function addTask(t, c, p) {
  const inp = document.getElementById('new-task');
  const text = t || inp.value.trim();
  if (!text) return;
  tasks.push({ id: ++id, text, cat: c||document.getElementById('cat-sel').value, pri: p||document.getElementById('pri-sel').value, done: false });
  if (!t) inp.value = '';
  render();
}

function render() {
  const sorted = [...tasks].filter(t => filter==='all'||filter===t.cat||(filter==='high'&&t.pri==='high'))
    .sort((a,b) => { const p={high:0,med:1,low:2}; return a.done!==b.done?a.done?1:-1:p[a.pri]-p[b.pri]; });

  document.getElementById('task-list').innerHTML = sorted.map(t => {
    const isEditing = editingId === t.id;
    return `
    <div class="task-item ${t.done?'done':''} ${isEditing?'editing':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.id})">
      ${isEditing
        ? `<input class="task-edit-input" id="edit-input-${t.id}" value="${t.text.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveEdit(${t.id});if(event.key==='Escape')cancelEdit()" />`
        : `<span class="task-label" ondblclick="startEdit(${t.id})">${t.text}</span>`
      }
      <span class="badge badge-${t.cat}" onclick="cycleCat(${t.id})" title="Bấm để đổi loại">${catL[t.cat]}</span>
      <span class="badge badge-${t.pri}" onclick="cyclePri(${t.id})" title="Bấm để đổi ưu tiên">${priL[t.pri]}</span>
      <div class="task-actions">
        ${isEditing
          ? `<button class="icon-btn" onclick="saveEdit(${t.id})" title="Lưu">✓</button>
             <button class="icon-btn" onclick="cancelEdit()" title="Huỷ">✕</button>`
          : `<button class="icon-btn" onclick="startEdit(${t.id})" title="Chỉnh sửa">✏️</button>
             <button class="icon-btn" onclick="del(${t.id})" title="Xoá">🗑️</button>`
        }
      </div>
    </div>`;
  }).join('');

  if (editingId) {
    const inp = document.getElementById(`edit-input-${editingId}`);
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }

  const done = tasks.filter(t=>t.done).length;
  document.getElementById('progress').textContent = `${done}/${tasks.length} xong`;
}

function toggle(i) { const t=tasks.find(t=>t.id===i); if(t) t.done=!t.done; render(); }
function del(i) { tasks=tasks.filter(t=>t.id!==i); render(); }
function clearDone() { tasks=tasks.filter(t=>!t.done); render(); }
function setFilter(f,btn) { filter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

function startEdit(i) { editingId=i; render(); }
function cancelEdit() { editingId=null; render(); }
function saveEdit(i) {
  const inp = document.getElementById(`edit-input-${i}`);
  if (inp && inp.value.trim()) {
    const t = tasks.find(t=>t.id===i);
    if (t) t.text = inp.value.trim();
  }
  editingId=null; render();
}

function cycleCat(i) { const t=tasks.find(t=>t.id===i); if(t) t.cat=catCycle[t.cat]; render(); }
function cyclePri(i) { const t=tasks.find(t=>t.id===i); if(t) t.pri=priCycle[t.pri]; render(); }

function exportRecheck() {
  const now = new Date();
  const ngay = now.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
  const gio = now.toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' });
  const pending = tasks.filter(t => !t.done);
  if (pending.length === 0) {
    document.getElementById('export-text').textContent = `recheck (${ngay}, ${gio})\n✅ Tất cả việc đã hoàn thành!`;
  } else {
    const lines = pending.map(t => `- ${t.text}`).join('\n');
    document.getElementById('export-text').textContent = `recheck (${ngay}, ${gio})\n${lines}`;
  }
  const box = document.getElementById('export-box');
  box.style.display = 'block';
  document.getElementById('copy-btn').textContent = 'Copy';
  document.getElementById('copy-btn').classList.remove('copied');
}

function copyExport() {
  const text = document.getElementById('export-text').textContent;
  navigator.clipboard.writeText(text).catch(() => {});
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✓ Đã copy!';
  btn.classList.add('copied');
}

defaults.forEach(d=>addTask(d.text,d.cat,d.pri));
</script>
</body>
</html>
