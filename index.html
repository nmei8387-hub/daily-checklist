<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist hôm nay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
.container { max-width: 640px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.progress { font-size: 12px; background: #e8f0fe; color: #1a56db; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid #ccc; border-radius: 99px; background: white; cursor: pointer; }
.filter-btn.active { background: #1a56db; color: white; border-color: #1a56db; }
.add-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.add-row input, .add-row select { font-size: 13px; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: white; }
.add-row input { flex: 1; }
.add-row button { padding: 8px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; }
.task-item { display: flex; align-items: center; gap: 10px; background: white; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; transition: opacity 0.2s; }
.task-item.done { opacity: 0.4; }
.task-item input[type=checkbox] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: #1a56db; }
.task-label { flex: 1; font-size: 14px; }
.task-item.done .task-label { text-decoration: line-through; color: #999; }
.badge { display: inline-flex; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
.badge-kh { background: #e8f0fe; color: #1a56db; }
.badge-nv { background: #e3fcef; color: #057a55; }
.badge-ht { background: #fdf6b2; color: #8e4b10; }
.badge-high { background: #fde8e8; color: #c81e1e; }
.badge-med { background: #fdf6b2; color: #8e4b10; }
.badge-low { background: #e3fcef; color: #057a55; }
.del-btn { background: none; border: none; cursor: pointer; color: #999; font-size: 18px; opacity: 0; padding: 0 4px; }
.task-item:hover .del-btn { opacity: 1; }
.actions { display: flex; gap: 8px; margin-top: 1rem; }
.ai-btn { flex: 1; font-size: 13px; padding: 8px; border: 0.5px solid #ccc; border-radius: 8px; background: white; cursor: pointer; }
.clear-btn { font-size: 13px; padding: 8px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: white; cursor: pointer; color: #666; }
.ai-status { display: none; align-items: center; gap: 8px; font-size: 13px; color: #666; margin-top: 10px; }
.spinner { width: 14px; height: 14px; border: 2px solid #eee; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sug-item { display: flex; align-items: center; gap: 8px; background: #fafafa; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
.sug-item span { flex: 1; font-size: 13px; }
.sug-add { font-size: 12px; padding: 3px 10px; border: 0.5px solid #ccc; border-radius: 6px; background: white; cursor: pointer; }
.sug-label { font-size: 12px; color: #999; margin: 10px 0 6px; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 Checklist hôm nay <span class="progress" id="progress">0/0 xong</span></h1>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tất cả</button>
    <button class="filter-btn" onclick="setFilter('kh',this)">Khách hàng</button>
    <button class="filter-btn" onclick="setFilter('nv',this)">Nội vụ</button>
    <button class="filter-btn" onclick="setFilter('ht',this)">Hệ thống</button>
    <button class="filter-btn" onclick="setFilter('high',this)">🔴 Gấp</button>
  </div>

  <div class="add-row">
    <input id="new-task" type="text" placeholder="Thêm việc cần làm..." onkeydown="if(event.key==='Enter')addTask()" />
    <select id="cat-sel">
      <option value="kh">Khách hàng</option>
      <option value="nv">Nội vụ</option>
      <option value="ht">Hệ thống</option>
    </select>
    <select id="pri-sel">
      <option value="high">🔴 Gấp</option>
      <option value="med">🟡 Bình thường</option>
      <option value="low">🟢 Thấp</option>
    </select>
    <button onclick="addTask()">+</button>
  </div>

  <div id="task-list"></div>

  <div class="actions">
    <button class="ai-btn" onclick="getAI()" id="ai-btn">✨ Gợi ý AI</button>
    <button class="clear-btn" onclick="clearDone()">Xoá đã xong</button>
  </div>

  <div class="ai-status" id="ai-status">
    <div class="spinner"></div> AI đang phân tích...
  </div>
  <div id="ai-box"></div>
</div>

<script>
let tasks = [], id = 0, filter = 'all';
const catL = { kh:'Khách hàng', nv:'Nội vụ', ht:'Hệ thống' };
const priL = { high:'🔴 Gấp', med:'🟡 Bình thường', low:'🟢 Thấp' };

const defaults = [
  { text:'Kiểm tra tin nhắn khách hàng mới', cat:'kh', pri:'high' },
  { text:'Follow up khách chờ phản hồi', cat:'kh', pri:'med' },
  { text:'Cập nhật báo cáo cuối ngày', cat:'nv', pri:'med' },
  { text:'Kiểm tra trạng thái hệ thống', cat:'ht', pri:'low' },
];

function addTask(t, c, p) {
  const inp = document.getElementById('new-task');
  const text = t || inp.value.trim();
  if (!text) return;
  tasks.push({ id: ++id, text, cat: c||document.getElementById('cat-sel').value, pri: p||document.getElementById('pri-sel').value, done: false });
  if (!t) inp.value = '';
  render();
}

function render() {
  const sorted = [...tasks].filter(t => filter==='all'||filter===t.cat||(filter==='high'&&t.pri==='high'))
    .sort((a,b) => { const p={high:0,med:1,low:2}; return a.done!==b.done?a.done?1:-1:p[a.pri]-p[b.pri]; });
  document.getElementById('task-list').innerHTML = sorted.map(t => `
    <div class="task-item ${t.done?'done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.id})">
      <span class="task-label">${t.text}</span>
      <span class="badge badge-${t.cat}">${catL[t.cat]}</span>
      <span class="badge badge-${t.pri}">${priL[t.pri]}</span>
      <button class="del-btn" onclick="del(${t.id})">×</button>
    </div>`).join('');
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('progress').textContent = `${done}/${tasks.length} xong`;
}

function toggle(i) { const t=tasks.find(t=>t.id===i); if(t) t.done=!t.done; render(); }
function del(i) { tasks=tasks.filter(t=>t.id!==i); render(); }
function clearDone() { tasks=tasks.filter(t=>!t.done); render(); }
function setFilter(f,btn) { filter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

async function getAI() {
  const btn=document.getElementById('ai-btn'), st=document.getElementById('ai-status'), box=document.getElementById('ai-box');
  btn.disabled=true; st.style.display='flex'; box.innerHTML='';
  const existing=tasks.map(t=>t.text).join(', ')||'chưa có';
  const done=tasks.filter(t=>t.done).map(t=>t.text).join(', ')||'chưa có';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`Bạn là trợ lý CSKH. Gợi ý 4 việc cần làm hôm nay dựa trên:\n- Đang làm: ${existing}\n- Đã xong: ${done}\n\nTrả về JSON hợp lệ, KHÔNG markdown:\n{"suggestions":[{"text":"việc cần làm","cat":"kh hoặc nv hoặc ht","pri":"high hoặc med hoặc low"}]}\n\nKhông trùng với danh sách. Tiếng Việt.`}]})});
    const data=await res.json();
    const parsed=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    st.style.display='none';
    box.innerHTML='<p class="sug-label">AI gợi ý:</p>'+parsed.suggestions.map(s=>`
      <div class="sug-item">
        <span>${s.text}</span>
        <span class="badge badge-${s.cat}">${catL[s.cat]}</span>
        <span class="badge badge-${s.pri}">${priL[s.pri]}</span>
        <button class="sug-add" onclick="addFromSug(this,'${s.text.replace(/'/g,"\\'")}','${s.cat}','${s.pri}')">+ Thêm</button>
      </div>`).join('');
  } catch(e) { st.style.display='none'; box.innerHTML='<p style="font-size:13px;color:#c81e1e;">Không lấy được gợi ý.</p>'; }
  btn.disabled=false;
}

function addFromSug(btn,t,c,p) { addTask(t,c,p); btn.closest('.sug-item').style.opacity='0.4'; btn.disabled=true; btn.textContent='✓'; }

defaults.forEach(d=>addTask(d.text,d.cat,d.pri));
</script>
</body>
</html>
